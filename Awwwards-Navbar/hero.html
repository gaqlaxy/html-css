<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,500..800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hero.css" />
</head>
<body>

  <header class="topbar">
    <a class="topbar__logo" href="#">NOVA</a>
    <button class="topbar__menu" type="button">Menu</button>
  </header>

  <!-- HERO — pinned while the showreel scales to fullscreen -->
  <section class="hero" id="hero">

    <div class="hero__headline" id="heroHeadline">
      <h1 class="hero__title">
        <span class="hero__title-line"><span class="hero__title-inner">We make</span></span>
        <span class="hero__title-line"><span class="hero__title-inner">brands</span></span>
        <span class="hero__title-line"><span class="hero__title-inner">move<sup>®</sup></span></span>
      </h1>
      <p class="hero__sub">Creative studio for design-led companies.<br />Chennai / worldwide.</p>
    </div>

    <p class="hero__hint" id="heroHint">Scroll</p>

    <!-- tiny showreel, bottom right -->
    <figure class="hero__reel" id="heroReel">
      <video
        class="hero__reel-video"
        src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
        autoplay muted loop playsinline
      ></video>
      <figcaption class="hero__reel-tag" id="heroReelTag">
        <span class="hero__reel-dot" aria-hidden="true"></span>
        Showreel — 2026
      </figcaption>
    </figure>

    <!-- PHASE 2 — the fullscreen reel shatters into 3 rotated service cards.
         Each card is a 1/3-width window onto the same video (media offset per
         card), so before the break the three read as one continuous frame. -->
    <div class="svc-stage" id="svcStage" aria-hidden="true">
      <p class="svc-stage__eyebrow" id="svcEyebrow">What we do</p>

      <article class="svc-card svc-card--1">
        <div class="svc-card__media">
          <video src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" autoplay muted loop playsinline></video>
        </div>
        <div class="svc-card__shade" aria-hidden="true"></div>
        <figcaption class="svc-card__label">
          <span class="svc-card__num">01</span>
          <span class="svc-card__name">Brand &amp; Identity</span>
          <span class="svc-card__desc">Logos, systems, guidelines</span>
        </figcaption>
      </article>

      <article class="svc-card svc-card--2">
        <div class="svc-card__media">
          <video src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" autoplay muted loop playsinline></video>
        </div>
        <div class="svc-card__shade" aria-hidden="true"></div>
        <figcaption class="svc-card__label">
          <span class="svc-card__num">02</span>
          <span class="svc-card__name">Web &amp; Interactive</span>
          <span class="svc-card__desc">Sites, products, prototypes</span>
        </figcaption>
      </article>

      <article class="svc-card svc-card--3">
        <div class="svc-card__media">
          <video src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" autoplay muted loop playsinline></video>
        </div>
        <div class="svc-card__shade" aria-hidden="true"></div>
        <figcaption class="svc-card__label">
          <span class="svc-card__num">03</span>
          <span class="svc-card__name">Motion &amp; Film</span>
          <span class="svc-card__desc">Reels, ads, title design</span>
        </figcaption>
      </article>
    </div>

  </section>

  <!-- phase 2 placeholder -->
  <section class="after">
    <p class="after__eyebrow">01 — Next</p>
    <h2 class="after__title">Phase 2 goes here.</h2>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="hero.js"></script>
</body>
</html>
